syntax = "proto3";

option csharp_namespace = "TaskManagement.Grpc";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

package taskmanagement;

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (UserResponse);
}

service UserService {
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
}

service ProjectService {
  rpc CreateProject (CreateProjectRequest) returns (ProjectResponse);
  rpc GetProject (GetProjectRequest) returns (ProjectResponse);
  rpc ListProjects (ListProjectsRequest) returns (ListProjectsResponse);
  rpc AddMember (AddProjectMemberRequest) returns (ProjectResponse);
  rpc RemoveMember (RemoveProjectMemberRequest) returns (google.protobuf.Empty);
  rpc DeleteProject (DeleteProjectRequest) returns (google.protobuf.Empty);
}

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);
  rpc GetTask (GetTaskRequest) returns (TaskResponse);
  rpc ListTasks (ListTasksRequest) returns (ListTasksResponse);
  rpc AssignTask (AssignTaskRequest) returns (TaskResponse);
  rpc ChangeStatus (ChangeTaskStatusRequest) returns (TaskResponse);
  rpc DeleteTask (DeleteTaskRequest) returns (google.protobuf.Empty);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 2;
  USER_ROLE_EXECUTOR = 3;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_TODO = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_REVIEW = 3;
  TASK_STATUS_DONE = 4;
}

enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_MEDIUM = 2;
  TASK_PRIORITY_HIGH = 3;
  TASK_PRIORITY_CRITICAL = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  UserResponse user = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message GetUserRequest {
  int32 id = 1;
}

message ListUsersRequest {
  int32 page_size = 1;
  int32 page_token = 2;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
}

message CreateProjectRequest {
  string name = 1;
  string description = 2;
  int32 created_by_id = 3;
}

message GetProjectRequest {
  int32 id = 1;
}

message ListProjectsRequest {
  int32 user_id = 1;
  int32 page_size = 2;
  int32 page_token = 3;
}

message AddProjectMemberRequest {
  int32 project_id = 1;
  int32 user_id = 2;
}

message RemoveProjectMemberRequest {
  int32 project_id = 1;
  int32 user_id = 2;
}

message DeleteProjectRequest {
  int32 id = 1;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  int32 project_id = 3;
  int32 created_by_id = 4;
  TaskPriority priority = 5;
  int32 assignee_id = 6;
}

message GetTaskRequest {
  int32 id = 1;
}

message ListTasksRequest {
  int32 project_id = 1;
  int32 page_size = 2;
  int32 page_token = 3;
}

message AssignTaskRequest {
  int32 task_id = 1;
  int32 assignee_id = 2;
}

message DeleteTaskRequest {
  int32 id = 1;
}

message ChangeTaskStatusRequest {
  int32 task_id = 1;
  TaskStatus status = 2;
}

message UserResponse {
  int32 id = 1;
  string username = 2;
  string email = 3;
}

message ProjectResponse {
  int32 id = 1;
  string name = 2;
  string description = 3;
  int32 created_by_id = 4;
  repeated int32 member_ids = 5;
  repeated int32 admin_ids = 6;
}

message TaskResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  int32 project_id = 4;
  int32 assignee_id = 5;
  TaskStatus status = 6;
  TaskPriority priority = 7;
  int32 created_by_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

message ListProjectsResponse {
  repeated ProjectResponse projects = 1;
}

message ListTasksResponse {
  repeated TaskResponse tasks = 1;
}